    ),
    el('div', { class: 'form-group', style: { marginBottom: '0' } },
      el('label', { class: 'form-label' }, 'Eval Runs'),
      evalRunsInput,
      el('div', { class: 'form-hint' }, 'Eval passes to average for baseline & final. 1 = single pass.')
    )
  ));

  const advToggleBtn = el('button', {
    type: 'button',
    style: { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--accent)', fontSize: '13px', fontFamily: 'var(--sans)', padding: '0', marginTop: '18px' }
  }, '▶ Advanced options');
  advToggleBtn.addEventListener('click', () => {
    const open = advBody.style.display !== 'none';
    advBody.style.display = open ? 'none' : '';
    advToggleBtn.textContent = (open ? '▶' : '▼') + ' Advanced options';
  });
  wrap.appendChild(advToggleBtn);
  wrap.appendChild(advBody);

  // ── Error box ─────────────────────────────────────────────
  const errBox = el('div', { style: { display: 'none', marginTop: '14px', padding: '10px 14px', background: 'rgba(248,113,113,0.1)', border: '1px solid rgba(248,113,113,0.3)', borderRadius: '7px', color: 'var(--red)', fontSize: '13px' } });

  // ── Submit ────────────────────────────────────────────────
  const runBtn = el('button', { class: 'btn btn-primary', style: { marginTop: '22px' } }, '▶ Start Optimization');
  runBtn.addEventListener('click', async () => {
    const prompt = promptTA.value.trim();
    const datasetPath = datasetInput.value.trim();
    const model = modelInput.value.trim();

    errBox.style.display = 'none';
    if (!prompt) { errBox.textContent = 'Prompt is required.'; errBox.style.display = 'block'; return; }
    if (runMode === 'pipeline') {
      if (!pipelineFileInput.value.trim()) { errBox.textContent = 'Pipeline file is required in pipeline mode.'; errBox.style.display = 'block'; return; }
      if (!inputsFileInput.value.trim()) { errBox.textContent = 'Inputs file is required in pipeline mode.'; errBox.style.display = 'block'; return; }
    } else {
      if (!datasetPath) { errBox.textContent = 'Dataset path is required.'; errBox.style.display = 'block'; return; }
      if (!model) { errBox.textContent = 'Model is required (e.g. openai/gpt-4o-mini).'; errBox.style.display = 'block'; return; }
      if (!model.includes('/')) { errBox.textContent = 'Model must be in provider/model format, e.g. openai/gpt-4o-mini.'; errBox.style.display = 'block'; return; }
    }
    if (threshMode === 'verdict' && !threshVerdictInput.value.trim()) { errBox.textContent = 'Verdict results path is required when using "From verdict" threshold.'; errBox.style.display = 'block'; return; }
    if (threshMode === 'auto' && !threshAutoInput.value.trim()) { errBox.textContent = 'At least one target model is required for Auto threshold.'; errBox.style.display = 'block'; return; }
    if (threshMode === 'auto' && threshAutoInput.value.split(',').map(s => s.trim()).filter(Boolean).some(m => !m.includes('/'))) { errBox.textContent = 'Each target model must be in provider/model format (e.g. openai/gpt-4o-mini).'; errBox.style.display = 'block'; return; }
    if (metricSel.value === 'judge' && !judgeInput.value.trim()) { errBox.textContent = 'Judge model is required when using LLM Judge (e.g. openai/gpt-4o-mini).'; errBox.style.display = 'block'; return; }
    if (metricSel.value === 'judge' && !judgeInput.value.trim().includes('/')) { errBox.textContent = 'Judge model must be in provider/model format.'; errBox.style.display = 'block'; return; }

    runBtn.disabled = true;
    runBtn.textContent = 'Starting…';

    try {
      const body = {
        prompt,
        dataset_path: runMode === 'pipeline' ? '' : datasetPath,
        model: runMode === 'pipeline' ? '' : model,
        pipeline_file: runMode === 'pipeline' ? pipelineFileInput.value.trim() : '',
        inputs_file: runMode === 'pipeline' ? inputsFileInput.value.trim() : '',
        metrics: metricSel.value === 'judge' ? [] : [metricSel.value],
        judge: metricSel.value === 'judge' ? judgeInput.value.trim() : '',
        judge_criteria: (metricSel.value === 'judge' && judgeScoringMode === 'single') ? judgeCriteria.value.trim() : '',
        judge_dimensions: (metricSel.value === 'judge' && judgeScoringMode === 'dimensions')
          ? judgeDimsInput.value.split(',').map(s => s.trim()).filter(Boolean)
          : [],
        strategy: strategySel.value,
        ranking_method: strategySel.value === 'pdo' ? rankingMethodSel.value : 'auto',
        max_iterations: parseInt(itersInput.value, 10) || 10,
        score_threshold: threshMode === 'manual' ? (parseFloat(threshManualInput.value) || 0.85) : 0.85,
        verdict_results_path: threshMode === 'verdict' ? threshVerdictInput.value.trim() : '',
        target_models: threshMode === 'auto' ? threshAutoInput.value.split(',').map(s => s.trim()).filter(Boolean) : [],
        reasoning_model: ($('#reasoning-model-input') || {}).value || '',
        reasoning_base_url: reasoningBaseUrlInput.value.trim(),
        source_model: ($('#source-model-input') || {}).value || '',
        max_tokens: parseInt(maxTokensInput.value, 10) || 1024,
        max_workers: parseInt(maxWorkersInput.value, 10) || 4,
        train_ratio: parseFloat(trainRatioInput.value) || 0.65,
        val_ratio: parseFloat(valRatioInput.value) || 0.20,
        early_stopping_patience: parseInt(earlyStopInput.value, 10) || 3,
        batch_size: parseInt(batchSizeInput.value, 10) || 0,
        full_eval_steps: parseInt(fullEvalStepInput.value, 10) || 0,
        eval_runs: parseInt(evalRunsInput.value, 10) || 1,
        duels_per_round: strategySel.value === 'pdo' ? (parseInt(duelRoundsInput.value, 10) || 3) : undefined,
        samples_per_duel: strategySel.value === 'pdo' ? (parseInt(samplesPerDuelInput.value, 10) || 10) : undefined,
        initial_pool_size: strategySel.value === 'pdo' ? (parseInt(initialPoolInput.value, 10) || 6) : undefined,
      };
      const resp = await fetch('/api/jobs/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Failed to start job');
      location.hash = '/jobs/' + data.job_id;
    } catch (e) {
      errBox.textContent = e.message;
      errBox.style.display = 'block';
      runBtn.disabled = false;
      runBtn.textContent = '▶ Start Optimization';
    }
  });

  wrap.appendChild(errBox);
  wrap.appendChild(runBtn);
  app.appendChild(wrap);
}

// ── Live Run Progress ────────────────────────────────────────
function renderLiveRun(jobId) {
  const app = $('#app');
  app.innerHTML = '';

  const scores = [];
  let status = 'starting';
  let completedRunId = null;
  let es = null;

  // ── Header ───────────────────────────────────────────────
  const statusBadge = el('span', { class: 'badge badge-running' }, '… running');
  const cancelBtn = el('button', { class: 'btn btn-danger', style: { marginLeft: 'auto' } }, '✕ Cancel');
  const header = el('div', { class: 'live-header' },
    el('button', { class: 'back-btn', style: { marginBottom: '0' }, onClick: () => {
      if (es) es.close();
      location.hash = '/';
    }}, '← Runs'),
    el('span', { style: { fontSize: '14px', fontWeight: '600' } }, 'Optimization in progress'),
    statusBadge,
    cancelBtn
  );
  app.appendChild(header);

  cancelBtn.addEventListener('click', async () => {
    cancelBtn.disabled = true;
    cancelBtn.textContent = 'Cancelling…';
    await fetch('/api/jobs/' + jobId + '/cancel', { method: 'POST' });
    if (es) es.close();
  });

  // ── Score display ─────────────────────────────────────────
  const scoreBig = el('div', { class: 'live-score-big' }, '--');
  const scoreLabel = el('div', { class: 'live-score-label' }, 'Latest score');
  const baselineEl = el('div', { style: { marginTop: '16px', fontSize: '12px', color: 'var(--text-2)' } }, 'Baseline: —');
  const reasonTokEl = el('div', { style: { marginTop: '6px', fontSize: '12px', color: 'var(--text-2)', fontFamily: 'var(--mono)' } });
  let totalReasonTok = 0;
  const iterTrack = el('div', { class: 'live-iter-track' });
  const rightPanel = el('div', { class: 'card' },
    el('div', { class: 'section-title' }, 'Score'),
    scoreBig, scoreLabel, baselineEl, reasonTokEl,
    el('div', { style: { marginTop: '20px' } },
      el('div', { class: 'section-title' }, 'Iterations'),
      iterTrack
    )
  );

  // ── Log ───────────────────────────────────────────────────
  const logEl = el('div', { class: 'live-log' });
  const addLog = (msg, cls = '') => {
    const now = new Date().toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    logEl.appendChild(el('div', { class: 'log-line' },
      el('span', { class: 'log-ts' }, now),
      el('span', { class: 'log-msg' + (cls ? ' ' + cls : '') }, msg)
    ));
    logEl.scrollTop = logEl.scrollHeight;
  };

  // ── Best prompt panel ─────────────────────────────────────
  const promptBox = el('pre', { class: 'prompt-text', style: { marginTop: '12px', display: 'none' } });
  const promptSection = el('div', { class: 'card', style: { marginTop: '16px' } },
    el('div', { class: 'section-title' }, 'Current best prompt'),
    promptBox
  );

  const leftPanel = el('div', null,
    el('div', { class: 'card' },
      el('div', { class: 'section-title' }, 'Log'),
      logEl
    ),
    promptSection
  );

  const grid = el('div', { class: 'live-grid' }, leftPanel, rightPanel);
  app.appendChild(grid);

  // ── View-run button (shown on completion) ─────────────────
  const viewRunBtn = el('button', { class: 'btn btn-primary', style: { display: 'none', marginTop: '16px' } }, '→ View Full Run');
  viewRunBtn.addEventListener('click', () => { location.hash = '/runs/' + completedRunId; });
  app.appendChild(viewRunBtn);

  // ── SSE connection ────────────────────────────────────────
  addLog('Connecting…');
  es = new EventSource('/api/jobs/' + jobId + '/stream');

  let baseline = null;

  es.onmessage = (e) => {
    const ev = JSON.parse(e.data);

    if (ev.type === 'queued') {
      addLog(ev.message || 'Queued');

    } else if (ev.type === 'iteration') {
      const iter = ev.iteration;
      const score = ev.score;
      scores.push(score);

      scoreBig.textContent = score.toFixed(4);
      const iterRTok = ev.reasoning_tokens || 0;
      if (iterRTok) {
        totalReasonTok += iterRTok;
        reasonTokEl.textContent = `Reasoning tokens: ${fmtTok(totalReasonTok)}`;
      }
      addLog(`iter ${String(iter).padStart(2, ' ')}  score: ${score.toFixed(4)}`, 'score');

      // Iter bar row
      const maxScore = Math.max(...scores, baseline || 0);
      const pct = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
      const bar = el('div', { class: 'live-iter-bar', style: { width: pct + '%' } });
      const row = el('div', { class: 'live-iter-row' },
        el('span', { class: 'live-iter-num' }, iter),
        el('div', { class: 'live-iter-bar-wrap' }, bar),
        el('span', { class: 'live-iter-score' }, score.toFixed(4))
      );
      iterTrack.appendChild(row);

      // Update prompt preview
      if (ev.system_prompt) {
        promptBox.textContent = ev.system_prompt;
        promptBox.style.display = 'block';
        promptSection.style.display = 'block';
      }

      // If first iter has a baseline context from queued
      if (baseline !== null) {
        const delta = score - baseline;
        const deltaStr = (delta >= 0 ? '+' : '') + delta.toFixed(4);
        baselineEl.textContent = `Baseline: ${baseline.toFixed(4)}  |  Δ best: ${deltaStr}`;
      }

    } else if (ev.type === 'complete') {
      es.close();
      completedRunId = ev.run_id;
      status = 'complete';
      statusBadge.className = 'badge badge-completed';
      statusBadge.textContent = '✓ completed';
      cancelBtn.style.display = 'none';
      const imp = ev.improvement_pct != null ? ' (' + (ev.improvement_pct >= 0 ? '+' : '') + ev.improvement_pct.toFixed(1) + '%)' : '';
      addLog(`Done — test score: ${ev.best_score != null ? ev.best_score.toFixed(4) : '--'}${imp}`, 'done');
      if (ev.best_prompt) {
        promptBox.textContent = ev.best_prompt;
        promptBox.style.display = 'block';
      }
      if (completedRunId) viewRunBtn.style.display = 'inline-flex';

    } else if (ev.type === 'cancelled') {
      es.close();
      status = 'cancelled';
      statusBadge.className = 'badge badge-interrupted';
      statusBadge.textContent = '⚡ cancelled';
      cancelBtn.style.display = 'none';
      addLog('Run cancelled.', 'error');

    } else if (ev.type === 'error') {
      es.close();
      status = 'error';
      statusBadge.className = 'badge';
      statusBadge.style.background = 'rgba(248,113,113,0.1)';
      statusBadge.style.color = 'var(--red)';
      statusBadge.textContent = '✕ error';
      cancelBtn.style.display = 'none';
      addLog('Error: ' + ev.message, 'error');
    }
  };

  es.onerror = () => {
    if (status === 'complete' || status === 'cancelled' || status === 'error') return;
    addLog('Connection lost. The run may still be in progress — check the Runs list.', 'error');
    statusBadge.className = 'badge badge-interrupted';
    statusBadge.textContent = '⚡ disconnected';
    es.close();
  };
}

// ── Route + Render ───────────────────────────────────────────
function getRoute() {
  const h = location.hash.replace(/^#/, '') || '/';
  const mRun = h.match(/^\/runs\/(\w+)/);
  if (mRun) return { page: 'run', id: mRun[1] };
  const mJob = h.match(/^\/jobs\/(\w+)/);
  if (mJob) return { page: 'job', id: mJob[1] };
  if (h === '/new') return { page: 'new' };
  return { page: 'list' };
}

function render() {
  const route = getRoute();
  const navRuns = $('#nav-runs');
  if (navRuns) navRuns.className = route.page === 'list' ? 'active' : '';

  if (route.page === 'run') { _runsPage = 0; renderRunDetail(route.id); }
  else if (route.page === 'new') { _runsPage = 0; renderNewRun(); }
  else if (route.page === 'job') { _runsPage = 0; renderLiveRun(route.id); }
  else renderRunsList();
}

window.addEventListener('hashchange', render);
render();
</script>
</body>
